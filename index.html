  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  window.addEventListener('error', function(e) {

    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';

      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');

    const templateData = JSON.parse(templateEl.textContent);
    const pages = templateData.pages;
    const entryId = templateData.entry;
    const pageIds = Object.keys(pages);

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : {};

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {

            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }

        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));

    // file:// document inherit a null origin, so crossorigin forces a CORS
    // fetch that SRI then rejects — the manifest bytes are ours; SRI protects
    // against CDN compromise, not this), and inject the page's own
    // window.__resources + the click interceptor into <head>. slice() rather
    // than replace() keeps us clear of $-pattern substitution.

      }
      return map;

      for (const uuid of uuids) t = t.split(uuid).join(blobUrls[uuid]);

      // a blanket <base target="_parent"> would also redirect form submissions
      // and tear down the wrapper. Non-# links navigate the parent to the
      // anchor's resolved href; #/… routes forward to the parent's hash only
      // when the id is one of this bundle's own pages (author #/… links from
      // an in-page hash router are left to the scroll path so they don't yank
      // the user to the entry page); plain #frag scrolls in place.

      // anchors, which closest()/IDL .target get wrong.

            'var tg = a.getAttribute("target");' +
            'if (tg && tg !== "_self") return;' +
            'var h = a.getAttribute("href") || a.getAttribute("xlink:href");' +
            'if (!h || /^javascript:/i.test(h)) return;' +
            'if (h.charAt(0) !== "#") {' +
              'if (!tg) { var b = document.querySelector("base[target]"); if (b && b.getAttribute("target") !== "_self") return; }' +
              'e.preventDefault();' +
              'if (/^(?:[a-z][a-z0-9+.-]*:|\\/\\/)/i.test(h)) parent.location.assign(h);' +
              'return;' +
            '}' +
            'e.preventDefault();' +
            'if (h.slice(0, 2) === "#/") {' +
              'var c = h.indexOf(":", 2);' +
              'var pid = c < 0 ? h.slice(2) : h.slice(2, c);' +
              'try { pid = decodeURIComponent(pid); } catch(err) {}' +
              'if (window.__bundler_pages.indexOf(pid) >= 0) { parent.location.hash = h; return; }' +
            '}' +
            'var t = h.length > 1 ? document.getElementById(h.slice(1)) : null;' +
            'if (t) t.scrollIntoView({behavior:"smooth"});' +
            'else scrollTo({top:0, behavior:"smooth"});' +
          '});' : '');
      // Defuse any script end-tag sequence in the content (resource ids, page
      // ids) before wrapping — same escape level as every sibling JSON island.
      var headScript = '<script>' +
        headContent.split('</' + 'script').join('<\\/' + 'script') +
        '</' + 'script>';
      // Inject after <head> so the DOCTYPE stays first; prepending the script
      // would push the parser into quirks mode. DOMParser always emits a <head>
      // (synthesizing one if the source HTML omitted it) but may carry
      // attributes through, so match the full opening tag.
      var headOpen = t.match(/<head[^>]*>/i);
      if (headOpen) {
        var hi = headOpen.index + headOpen[0].length;
        t = t.slice(0, hi) + headScript + t.slice(hi);
      }
      pages[id] = t;
    }

    setStatus('Rendering...');

    if (pageIds.length === 1) {
      // Single page: the pre-crawl render path. Parse the template and swap the
      // root element. Scripts inserted via DOMParser/replaceWith are inert per
      // spec — re-create each with createElement so they execute, awaiting
      // onload for src scripts to preserve ordering (React before ReactDOM
      // before Babel before text/babel).
      var template = pages[entryId];
      const doc = new DOMParser().parseFromString(template, 'text/html');
      document.documentElement.replaceWith(doc.documentElement);
      const dead = Array.from(document.scripts);
      for (const old of dead) {
        const s = document.createElement('script');
        for (const a of old.attributes) s.setAttribute(a.name, a.value);
        s.textContent = old.textContent;
        // text/babel scripts with a src: fetch and inline. transformScriptTags
        // does XHR against the src, but blob:null/ from a file:// origin is
        // silently dropped. Inlining makes it a plain inline babel script,
        // which transformScriptTags handles unconditionally.
        if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
          try {
            const r = await fetch(s.src);
            s.textContent = await r.text();
            s.removeAttribute('src');
          } catch (e) {}
        }
        // Non-executable script types (text/babel, application/json, …) are
        // data blocks per spec: the browser never fetches src and never fires
        // load/error, so awaiting would hang forever.
        const exec = !s.type || s.type === 'module' || /(java|ecma)script/i.test(s.type);
        const p = (s.src && exec) ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
        old.replaceWith(s);
        if (p) await p;
      }
      // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
      // which fired before we swapped the document. Trigger manually if present.
      if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
        window.Babel.transformScriptTags();
      }
      return;
    }

    // Multi-page: render into a full-viewport srcdoc iframe so each page runs
    // in its own realm while staying same-origin with the parent (so asset
    // blob URLs load and parent.location is writable).
    var frame = document.createElement('iframe');
    frame.id = '__bundler_frame';
    frame.setAttribute('style', 'position:fixed;inset:0;width:100%;height:100%;border:0;background:#fff');
    document.body.appendChild(frame);

    function decode(s) {
      try { return decodeURIComponent(s); } catch (e) { return s; }
    }
    function route() {
      var h = (location.hash || '');
      if (h.slice(0, 2) !== '#/') return { id: entryId, anchor: '' };
      h = h.slice(2);
      var i = h.indexOf(':');
      return i < 0 ? { id: decode(h), anchor: '' }
                   : { id: decode(h.slice(0, i)), anchor: decode(h.slice(i + 1)) };
    }

    var current = null;
    var navGen = 0;
    function navigate() {
      var r = route();
      var id = Object.prototype.hasOwnProperty.call(pages, r.id) ? r.id : entryId;
      if (current === id) {
        // Same-page anchor change: the iframe's own hash handles this, so
        // normally we don't reach here. If we do (e.g. a programmatic
        // parent.location.hash change), nudge the iframe.
        var cw = frame.contentWindow;
        if (!cw) return;
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView({ behavior: 'smooth' });
        else cw.scrollTo({ top: 0, behavior: 'smooth' });
        return;
      }
      current = id;
      var gen = ++navGen;
      frame.onload = function() {
        // One-shot: an iframe-internal navigation (form submit, page JS
        // location.href=) re-fires onload with the same gen; after that the
        // iframe may be cross-origin, and cw.* access would throw.
        frame.onload = null;
        if (gen !== navGen) return;
        var cw = frame.contentWindow;
        try { cw.document.title && (document.title = cw.document.title); } catch (e) {}
        var splash = document.getElementById('__bundler_thumbnail') ||
                     document.getElementById('__bundler_placeholder');
        if (splash) splash.remove();
        if (loading) loading.remove();
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView();
        else cw.scrollTo(0, 0);
      };
      frame.srcdoc = pages[id];
    }

    window.addEventListener('hashchange', navigate);
    navigate();
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

Fa>\n        <a href=\"https://github.com/Fineken/macs-research\" target=\"_blank\" rel=\"noopener\" style=\"display:block; text-decoration:none; border:1px solid var(--hairline); background:var(--surface); padding:32px 30px;\">\n          <div style=\"display:flex; justify-content:space-between; align-items:flex-start;\"><span style=\"font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--accent);\">02<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--faint); letter-spacing:.1em;\">GITHUB ↗<\u002Fspan><\u002Fdiv>\n          <h3 style=\"font-size:21px; font-weight:600; color:var(--ink); margin:20px 0 0;\">LLM Research Framework<\u002Fh3>\n          <p style=\"font-size:14.5px; line-height:1.6; color:var(--muted); margin:12px 0 20px;\" data-i18n=\"proj.2\">Исследовательский фреймворк для сравнения больших языковых моделей и анализа встроенных ReAct-механизмов.<\u002Fp>\n          <div style=\"display:flex; gap:7px; flex-wrap:wrap;\"><span style=\"font-family:'JetBrains Mono',monospace; font-size:10.5px; color:var(--muted); border:1px solid var(--hairline-strong); padding:5px 9px;\">Python<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace; font-size:10.5px; color:var(--muted); border:1px solid var(--hairline-strong); padding:5px 9px;\">GPT-4<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace; font-size:10.5px; color:var(--muted); border:1px solid var(--hairline-strong); padding:5px 9px;\">Claude<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace; font-size:10.5px; color:var(--muted); border:1px solid var(--hairline-strong); padding:5px 9px;\">LLM APIs<\u002Fspan><\u002Fdiv>\n        <\u002Fa>\n        <a href=\"https://github.com/Fineken/restic_app\" target=\"_blank\" rel=\"noopener\" style=\"display:block; text-decoration:none; border:1px solid var(--hairline); background:var(--surface); padding:32px 30px;\">\n          <div style=\"display:flex; justify-content:space-between; align-items:flex-start;\"><span style=\"font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--accent);\">03<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--faint); letter-spacing:.1em;\">GITHUB ↗<\u002Fspan><\u002Fdiv>\n          <h3 style=\"font-size:21px; font-weight:600; color:var(--ink); margin:20px 0 0;\">Restic Backup Application<\u002Fh3>\n          <p style=\"font-size:14.5px; line-height:1.6; color:var(--muted); margin:12px 0 20px;\" data-i18n=\"proj.3\">Автоматизированное решение для резервного копирования на базе Restic с дедупликацией и гибким расписанием.<\u002Fp>\n          <div style=\"display:flex; gap:7px; flex-wrap:wrap;\"><span style=\"font-family:'JetBrains Mono',monospace; font-size:10.5px; color:var(--muted); border:1px solid var(--hairline-strong); padding:5px 9px;\">Python<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace; font-size:10.5px; color:var(--muted); border:1px solid var(--hairline-strong); padding:5px 9px;\">Restic<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace; font-size:10.5px; color:var(--muted); border:1px solid var(--hairline-strong); padding:5px 9px;\">CLI<\u002Fspan><\u002Fdiv>\n        <\u002Fa>\n        <a href=\"https://github.com/Fineken/ReadKnowlege\" target=\"_blank\" rel=\"noopener\" style=\"display:block; text-decoration:none; border:1px solid var(--hairline); background:var(--surface); padding:32px 30px;\">\n          <div style=\"display:flex; justify-content:space-between; align-items:flex-start;\"><span style=\"font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--accent);\">04<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--faint); letter-spacing:.1em;\">GITHUB ↗<\u002Fspan><\u002Fdiv>\n          <h3 style=\"font-size:21px; font-weight:600; color:var(--ink); margin:20px 0 0;\">ReadKnowledge<\u002Fh3>\n          <p style=\"font-size:14.5px; line-height:1.6; color:var(--muted); margin:12px 0 20px;\" data-i18n=\"proj.4\">Flask-приложение для управления библиотекой книг с поиском, категоризацией и SQLite-хранилищем.<\u002Fp>\n          <div style=\"display:flex; gap:7px; flex-wrap:wrap;\"><span style=\"font-family:'JetBrains Mono',monospace; font-size:10.5px; color:var(--muted); border:1px solid var(--hairline-strong); padding:5px 9px;\">Flask<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace; font-size:10.5px; color:var(--muted); border:1px solid var(--hairline-strong); padding:5px 9px;\">SQLite<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace; font-size:10.5px; color:var(--muted); border:1px solid var(--hairline-strong); padding:5px 9px;\">Bootstrap<\u002Fspan><\u002Fdiv>\n        <\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===================== CONTACT ===================== -->\n  <section id=\"contact\" style=\"scroll-margin-top:64px; padding:120px 0; background:var(--surface-2);\">\n    <div data-wrap=\"\" style=\"max-width:1160px; margin:0 auto; padding:0 40px;\">\n      <div style=\"font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:.24em; text-transform:uppercase; color:var(--accent); margin-bottom:14px;\">§ 06 — <span data-i18n=\"nav.contact\">Контакты<\u002Fspan><\u002Fdiv>\n      <h2 style=\"font-family:'JetBrains Mono',monospace; font-weight:700; font-size:clamp(34px,5.5vw,72px); letter-spacing:-.03em; color:var(--ink); margin:0; max-width:900px; line-height:1.02;\" data-i18n=\"contact.title\">Обсудим инфраструктуру?<\u002Fh2>\n      <p style=\"font-size:17px; line-height:1.6; color:var(--muted); margin:26px 0 0; max-width:520px;\" data-i18n=\"contact.lead\">Открыт к задачам по DevOps, платформенной инженерии и безопасности. Отвечаю быстро.<\u002Fp>\n\n      <div data-grid=\"contact\" style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:1px; background:var(--hairline); border:1px solid var(--hairline); margin-top:48px; max-width:760px;\">\n        <a href=\"mailto:danilzolotarev1980@gmail.com\" style=\"background:var(--bg); padding:26px 24px; text-decoration:none; display:block;\"><div style=\"font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:.16em; text-transform:uppercase; color:var(--faint);\">Email<\u002Fdiv><div style=\"font-family:'JetBrains Mono',monospace; font-size:13px; color:var(--ink); margin-top:10px; word-break:break-all;\">danilzolotarev1980<wbr>@gmail.com<\u002Fdiv><\u002Fa>\n        <a href=\"https://t.me/My_Workstation\" target=\"_blank\" rel=\"noopener\" style=\"background:var(--bg); padding:26px 24px; text-decoration:none; display:block;\"><div style=\"font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:.16em; text-transform:uppercase; color:var(--faint);\">Telegram<\u002Fdiv><div style=\"font-family:'JetBrains Mono',monospace; font-size:13px; color:var(--ink); margin-top:10px;\">@My_Workstation<\u002Fdiv><\u002Fa>\n        <a href=\"https://github.com/Fineken\" target=\"_blank\" rel=\"noopener\" style=\"background:var(--bg); padding:26px 24px; text-decoration:none; display:block;\"><div style=\"font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:.16em; text-transform:uppercase; color:var(--faint);\">GitHub<\u002Fdiv><div style=\"font-family:'JetBrains Mono',monospace; font-size:13px; color:var(--ink); margin-top:10px;\">github.com/Fineken<\u002Fdiv><\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===================== FOOTER ===================== -->\n  <footer style=\"background:var(--bg); border-top:1px solid var(--hairline); padding:32px 0;\">\n    <div style=\"max-width:1160px; margin:0 auto; padding:0 40px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:14px;\">\n      <div style=\"font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--faint); letter-spacing:.06em;\">© 2026 DANIL ZOLOTAREV · MOSCOW, RU<\u002Fdiv>\n      <a href=\"#hero\" style=\"font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--muted); letter-spacing:.1em; text-decoration:none;\" data-i18n=\"footer.top\">НАВЕРХ ↑<\u002Fa>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  componentDidMount() {\n    this._dead = false;\n    const root = document.getElementById('site');\n    this.root = root;\n\n    // ---------- THEME ----------\n    const THEMES = {\n      light: { '--bg':'#fafaf8','--surface':'#ffffff','--surface-2':'#f2f2ee','--panel':'#f2f2ee','--ink':'#111114','--muted':'#56564d','--faint':'#9a9a90','--hairline':'rgba(17,17,20,.12)','--hairline-strong':'rgba(17,17,20,.22)','--accent':'#5b54f5','--grid':'rgba(17,17,20,.05)','--grid2':'rgba(17,17,20,.09)' },\n      dark:  { '--bg':'#0a0b0e','--surface':'#121317','--surface-2':'#101116','--panel':'#121317','--ink':'#f4f4f5','--muted':'#9a9aa3','--faint':'#6a6a72','--hairline':'rgba(255,255,255,.10)','--hairline-strong':'rgba(255,255,255,.20)','--accent':'#7b75ff','--grid':'rgba(255,255,255,.035)','--grid2':'rgba(255,255,255,.06)' }\n    };\n    const applyTheme = (t) => {\n      const v = THEMES[t]; for (const k in v) root.style.setProperty(k, v[k]);\n      root.setAttribute('data-theme', t);\n      const ic = document.getElementById('theme-ic'); if (ic) ic.textContent = (t === 'dark') ? '☀' : '☾';\n      try { localStorage.setItem('dz_theme', t); } catch(e) {}\n    };\n    let theme = 'light'; try { theme = localStorage.getItem('dz_theme') || 'light'; } catch(e) {}\n    applyTheme(theme);\n    root.querySelectorAll('[data-theme-toggle]').forEach(b => b.addEventListener('click', () => {\n      applyTheme(root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');\n    }));\n\n    // ---------- I18N ----------\n    const I18N = {\n      'nav.about': { ru:'О себе', en:'About' },\n      'nav.education': { ru:'Образование', en:'Education' },\n      'nav.publications': { ru:'Публикации', en:'Publications' },\n      'nav.skills': { ru:'Стек', en:'Stack' },\n      'nav.projects': { ru:'Проекты', en:'Projects' },\n      'nav.contact': { ru:'Контакты', en:'Contact' },\n      'hero.summary': { ru:'DevOps-инженер. 6+ лет строю отказоустойчивые высоконагруженные сервисы: контейнеризация, Kubernetes, CI/CD, DevSecOps и ML в кибербезопасности.', en:'DevOps engineer. 6+ years building fault-tolerant, high-load services: containerization, Kubernetes, CI/CD, DevSecOps and ML in cybersecurity.' },\n      'hero.contact': { ru:'Связаться', en:'Get in touch' },\n      'panel.status': { ru:'СТАТУС', en:'STATUS' },\n      'panel.status_val': { ru:'ДОСТУПЕН', en:'AVAILABLE' },\n      'panel.exp': { ru:'ОПЫТ', en:'EXP' },\n      'panel.exp_val': { ru:'6+ ЛЕТ', en:'6+ YEARS' },\n      'panel.papers': { ru:'ПУБЛИКАЦИИ', en:'PAPERS' },\n      'panel.edu': { ru:'ВУЗ', en:'EDU' },\n      'panel.loc': { ru:'ГОРОД', en:'LOCATION' },\n      'panel.loc_val': { ru:'МОСКВА, RU', en:'MOSCOW, RU' },\n      'about.title': { ru:'Инженер инфраструктуры', en:'Infrastructure engineer' },\n      'about.p1': { ru:'DevOps-инженер с 6+ годами опыта построения высоконагруженных и отказоустойчивых сервисов. Эксперт в контейнеризации, оркестрации Kubernetes и автоматизации CI/CD; практикую DevSecOps — HashiCorp Vault, Helm, SAST/DAST, IaC. Строю ML-детекторы аномалий и XDR-сценарии для защиты облачной инфраструктуры.', en:'DevOps engineer with 6+ years building high-load, highly available services. Expert in containerization, Kubernetes orchestration and CI/CD automation; practice DevSecOps — HashiCorp Vault, Helm, SAST/DAST, IaC. Build ML anomaly detectors and XDR scenarios to protect cloud infrastructure.' },\n      'about.p2': { ru:'Магистрант МФТИ (кафедра SberTech); автор 11 публикаций, включая работы Scopus по threat intelligence и LLM. Участник инженерных школ Яндекса, Тинькофф и Positive Technologies.', en:'MIPT graduate (SberTech dept); author of 11 publications, including Scopus papers on threat intelligence and LLM. Participant of engineering schools by Yandex, Tinkoff and Positive Technologies.' },\n      'stat.years': { ru:'лет опыта', en:'years exp' },\n      'stat.pubs': { ru:'публикаций', en:'publications' },\n      'stat.work': { ru:'рабочих станций', en:'workstations' },\n      'stat.team': { ru:'человек в команде', en:'team size' },\n      'education.title': { ru:'Образование', en:'Education' },\n      'edu.mipt.degree': { ru:'Магистр · Высоконагруженные системы · каф. SberTech', en:'Master · High-load systems · SberTech dept' },\n      'edu.mipt.desc': { ru:'Магистерская диссертация «Модели и алгоритмы обработки слабоструктурированных данных в центрах киберразведки». Оценка — отлично (9), защита с отличием. Применение LLM и RAG для анализа угроз, модульная архитектура центров киберразведки.', en:'Master thesis “Models and algorithms for processing weakly-structured data in cyber intelligence centers”. Grade: excellent (9), defended with honors. LLM and RAG for threat analysis, modular architecture for cyber intelligence centers.' },\n      'edu.ibi.degree': { ru:'Финансовый менеджмент', en:'Financial Management' },\n      'edu.ibi.desc': { ru:'Дополнительное образование по финансовому менеджменту для расширения экспертизы в FinTech и применения DevOps-практик в финансовых организациях.', en:'Additional education in financial management to expand FinTech expertise and apply DevOps practices in financial organizations.' },\n      'edu.ibi.tag': { ru:'Финансовый менеджмент', en:'Financial management' },\n      'edu.usatu.degree': { ru:'Бакалавр · Информационная безопасность', en:'Bachelor · Information Security' },\n      'edu.usatu.desc': { ru:'Дипломная работа «Разработка комплексного решения защиты систем виртуализации на базе VMware». Оценка — отлично (5), рекомендация к магистратуре. Программный межсетевой экран, IDS, сканеры и антивирусное ПО; ускорение обработки в 20×.', en:'Bachelor thesis “Comprehensive protection solution for VMware-based virtualization systems”. Grade: excellent (5), recommended for master’s. Software firewall, IDS, scanners and antivirus; 20× processing speed-up.' },\n      'tag.virt': { ru:'Виртуализация', en:'Virtualization' },\n      'publications.title': { ru:'Научные публикации', en:'Publications' },\n      'filter.all': { ru:'Все', en:'All' },\n      'filter.security': { ru:'Безопасность', en:'Security' },\n      'filter.hum': { ru:'Гуманитарные', en:'Humanities' },\n      'cat.hum': { ru:'Гуманитарные', en:'Humanities' },\n      'skills.title': { ru:'Технологический стек', en:'Technology stack' },\n      'sk.orch': { ru:'Оркестрация', en:'Orchestration' },\n      'sk.sec': { ru:'Безопасность', en:'Security' },\n      'sk.store': { ru:'Хранилища', en:'Data stores' },\n      'sk.obs': { ru:'Мониторинг · Сеть', en:'Observability · Net' },\n      'projects.title': { ru:'Избранные проекты', en:'Selected projects' },\n      'proj.1': { ru:'Helm-чарт для развёртывания Apache Superset в Kubernetes с интеграцией HashiCorp Vault и Jenkins CI/CD.', en:'Helm chart for deploying Apache Superset on Kubernetes with HashiCorp Vault and Jenkins CI/CD integration.' },\n      'proj.2': { ru:'Исследовательский фреймворк для сравнения больших языковых моделей и анализа встроенных ReAct-механизмов.', en:'Research framework for comparing large language models and analyzing built-in ReAct mechanisms.' },\n      'proj.3': { ru:'Автоматизированное решение для резервного копирования на базе Restic с дедупликацией и гибким расписанием.', en:'Automated backup solution built on Restic with deduplication and flexible scheduling.' },\n      'proj.4': { ru:'Flask-приложение для управления библиотекой книг с поиском, категоризацией и SQLite-хранилищем.', en:'Flask app for managing a book library with search, categorization and SQLite storage.' },\n      'contact.title': { ru:'Обсудим инфраструктуру?', en:'Let’s talk infrastructure.' },\n      'contact.lead': { ru:'Открыт к задачам по DevOps, платформенной инженерии и безопасности. Отвечаю быстро.', en:'Open to DevOps, platform engineering and security work. Quick to respond.' },\n      'footer.top': { ru:'НАВЕРХ ↑', en:'BACK TO TOP ↑' }\n    };\n    const applyLang = (l) => {\n      root.querySelectorAll('[data-i18n]').forEach(el => {\n        const tr = I18N[el.getAttribute('data-i18n')];\n        if (tr && tr[l] != null) el.textContent = tr[l];\n      });\n      root.querySelectorAll('[data-lang-btn]').forEach(b => {\n        const on = b.getAttribute('data-lang-btn') === l;\n        b.style.color = on ? 'var(--ink)' : 'var(--faint)';\n        b.style.fontWeight = on ? '600' : '400';\n      });\n      try { localStorage.setItem('dz_lang', l); } catch(e) {}\n    };\n    let lang = 'ru'; try { lang = localStorage.getItem('dz_lang') || 'ru'; } catch(e) {}\n    applyLang(lang);\n    root.querySelectorAll('[data-lang-btn]').forEach(b => b.addEventListener('click', () => applyLang(b.getAttribute('data-lang-btn'))));\n\n    // ---------- PUBLICATION FILTERS ----------\n    const fbtns = root.querySelectorAll('[data-filter]');\n    fbtns.forEach(b => b.addEventListener('click', () => {\n      const f = b.getAttribute('data-filter');\n      root.querySelectorAll('[data-pub]').forEach(row => {\n        row.style.display = (f === 'all' || row.getAttribute('data-cat') === f) ? '' : 'none';\n      });\n      fbtns.forEach(x => {\n        const on = x === b;\n        x.style.background = on ? 'var(--accent)' : 'transparent';\n        x.style.color = on ? '#fff' : 'var(--muted)';\n        x.style.borderColor = on ? 'var(--accent)' : 'var(--hairline-strong)';\n      });\n    }));\n\n    // ---------- RESPONSIVE ----------\n    const navLinks = root.querySelector('[data-navlinks]');\n    const burger = root.querySelector('[data-burger]');\n    const menu = root.querySelector('[data-mobilemenu]');\n    const navWrap = root.querySelector('nav > div');\n    const heroLeft = root.querySelector('[data-heroleft]');\n    const heroPanel = root.querySelector('[data-heropanel]');\n    const secs = ['#about','#education','#publications','#skills','#projects'].map(s => root.querySelector(s));\n    const contactSec = root.querySelector('#contact');\n    const grids = {\n      stats: root.querySelector('[data-grid=\"stats\"]'),\n      about: root.querySelector('[data-grid=\"about\"]'),\n      edu: [...root.querySelectorAll('[data-grid=\"edu\"]')],\n      skills: root.querySelector('[data-grid=\"skills\"]'),\n      projects: root.querySelector('[data-grid=\"projects\"]'),\n      contact: root.querySelector('[data-grid=\"contact\"]')\n    };\n    const wraps = [...root.querySelectorAll('[data-wrap]')];\n    const pubs = [...root.querySelectorAll('[data-pub]')];\n    const closeMenu = () => { if (menu) menu.style.display = 'none'; };\n    if (burger) burger.addEventListener('click', () => { menu.style.display = (menu.style.display === 'block') ? 'none' : 'block'; });\n    root.querySelectorAll('[data-menulink]').forEach(a => a.addEventListener('click', closeMenu));\n    const applyResp = () => {\n      const m = window.innerWidth <= 760;\n      if (navLinks) navLinks.style.display = m ? 'none' : 'flex';\n      if (burger) burger.style.display = m ? 'flex' : 'none';\n      if (!m) closeMenu();\n      if (navWrap) { navWrap.style.paddingLeft = m ? '20px' : '40px'; navWrap.style.paddingRight = m ? '20px' : '40px'; }\n      if (grids.stats) grids.stats.style.gridTemplateColumns = m ? 'repeat(2,1fr)' : 'repeat(4,1fr)';\n      if (grids.about) grids.about.style.gridTemplateColumns = m ? '1fr' : '1fr 1fr';\n      grids.edu.forEach(e => { e.style.gridTemplateColumns = m ? '1fr' : '160px 1fr'; e.style.gap = m ? '10px' : '32px'; });\n      if (grids.skills) grids.skills.style.gridTemplateColumns = m ? '1fr 1fr' : 'repeat(3,1fr)';\n      if (grids.projects) grids.projects.style.gridTemplateColumns = m ? '1fr' : '1fr 1fr';\n      if (grids.contact) grids.contact.style.gridTemplateColumns = m ? '1fr' : 'repeat(3,1fr)';\n      wraps.forEach(w => { w.style.paddingLeft = m ? '20px' : '40px'; w.style.paddingRight = m ? '20px' : '40px'; });\n      pubs.forEach(r => {\n        if (m) {\n          r.style.display = 'block';\n          if (r.children[0]) { r.children[0].style.display = 'inline-block'; r.children[0].style.marginRight = '10px'; }\n          if (r.children[1]) { r.children[1].style.display = 'inline-block'; }\n          if (r.children[2]) { r.children[2].style.marginTop = '8px'; }\n        } else {\n          r.style.display = 'grid';\n          r.style.gridTemplateColumns = '64px 130px 1fr';\n          if (r.children[0]) { r.children[0].style.display = ''; r.children[0].style.marginRight = ''; }\n          if (r.children[1]) { r.children[1].style.display = ''; }\n          if (r.children[2]) { r.children[2].style.marginTop = ''; }\n        }\n      });\n      if (heroLeft) heroLeft.style.padding = m ? '36px 20px 44px' : '64px 40px 72px';\n      if (heroPanel) { heroPanel.style.borderLeft = m ? 'none' : '1px solid var(--hairline)'; heroPanel.style.borderTop = m ? '1px solid var(--hairline)' : 'none'; }\n      secs.forEach(s => { if (s) s.style.padding = m ? '64px 0' : '110px 0'; });\n      if (contactSec) contactSec.style.padding = m ? '76px 0' : '120px 0';\n    };\n    applyResp();\n    window.addEventListener('resize', applyResp);\n\n    // ---------- THREE.JS HERO ----------\n    this._wait(0);\n  }\n  componentWillUnmount() { this._dead = true; }\n  _wait(n) {\n    if (this._dead) return;\n    if (window.THREE) { this._initThree(); return; }\n    if (n > 80) return;\n    setTimeout(() => this._wait(n + 1), 100);\n  }\n  _initThree() {\n    const T = window.THREE;\n    const canvas = document.getElementById('hero-canvas');\n    if (!canvas) return;\n    if (canvas.__heroInit) return; canvas.__heroInit = true;\n    const W = () => canvas.clientWidth || 800, H = () => canvas.clientHeight || 600;\n    const renderer = new T.WebGLRenderer({ canvas, alpha: true, antialias: true, preserveDrawingBuffer: true });\n    renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));\n    renderer.setSize(W(), H(), false);\n    const scene = new T.Scene();\n    const camera = new T.PerspectiveCamera(70, W() / H(), 0.1, 1000);\n    camera.position.z = 30;\n\n    // particle field\n    const PC = 220, pos = new Float32Array(PC * 3), vel = new Float32Array(PC * 3);\n    for (let i = 0; i < PC * 3; i++) { pos[i] = (Math.random() - 0.5) * 100; vel[i] = (Math.random() - 0.5) * 0.02; }\n    const pg = new T.BufferGeometry();\n    pg.setAttribute('position', new T.BufferAttribute(pos, 3));\n    const pts = new T.Points(pg, new T.PointsMaterial({ color: 0x6b64ff, size: 1.4, transparent: true, opacity: 0.5 }));\n    scene.add(pts);\n\n    // flying technology logos (the real story)\n    const group = new T.Group(); scene.add(group);\n    const sprites = [];\n    const NAMES = ['docker','kubernetes','jenkins','github','gitlab','git','python','ansible','postgresql','mongodb','redis','kafka','nginx','grafana','prometheus','vault','aws','ubuntu','elasticsearch','rancher','airflow','sonarqube','haproxy','mysql','debian','linux','bitbucket','jira','confluence','minio','bitwarden','bash','zabbix'];\n    const addSprite = (tex) => {\n      const g = new T.BufferGeometry();\n      g.setAttribute('position', new T.BufferAttribute(new Float32Array([0, 0, 0]), 3));\n      const base = 4.5 + Math.random() * 5;\n      const mat = new T.PointsMaterial({ map: tex, size: base, sizeAttenuation: true, transparent: true, opacity: 0.7, alphaTest: 0.2, depthWrite: false });\n      const s = new T.Points(g, mat);\n      s.position.set((Math.random() - 0.5) * 96, (Math.random() - 0.5) * 60, (Math.random() - 0.5) * 44);\n      s.userData = { base: base, vx: (Math.random() - 0.5) * 0.05, vy: (Math.random() - 0.5) * 0.04, vz: (Math.random() - 0.5) * 0.03, t: Math.random() * 6.28 };\n      group.add(s); sprites.push(s);\n      try { renderer.render(scene, camera); } catch (e) {}\n    };\n    NAMES.forEach((n, idx) => {\n      const img = new Image();\n      img.onload = () => {\n        const c = document.createElement('canvas'); c.width = c.height = 128;\n        const cx = c.getContext('2d');\n        let iw = img.naturalWidth || img.width, ih = img.naturalHeight || img.height;\n        if (!iw || !ih) { iw = ih = 104; } else { const k = 104 / Math.max(iw, ih); iw *= k; ih *= k; }\n        cx.drawImage(img, (128 - iw) / 2, (128 - ih) / 2, iw, ih);\n        const tex = new T.CanvasTexture(c); tex.needsUpdate = true;\n        addSprite(tex); if (idx < 7) addSprite(tex);\n      };\n      img.src = 'assets/images/tech-logos/' + n + '.svg';\n    });\n\n    const onResize = () => { renderer.setSize(W(), H(), false); camera.aspect = W() / H(); camera.updateProjectionMatrix(); };\n    window.addEventListener('resize', onResize);\n    this._onResize = onResize;\n    const B = { x: 50, y: 34, z: 24 };\n    const loop = () => {\n      if (!canvas.isConnected) { renderer.dispose && renderer.dispose(); return; }\n      try {\n      const tm = Date.now() * 0.001;\n      const pa = pg.attributes.position.array;\n      for (let i = 0; i < pa.length; i += 3) {\n        pa[i] += vel[i]; pa[i + 1] += vel[i + 1]; pa[i + 2] += vel[i + 2];\n        if (Math.abs(pa[i]) > 50) vel[i] *= -1;\n        if (Math.abs(pa[i + 1]) > 50) vel[i + 1] *= -1;\n        if (Math.abs(pa[i + 2]) > 50) vel[i + 2] *= -1;\n      }\n      pg.attributes.position.needsUpdate = true; pts.rotation.y += 0.0006;\n      sprites.forEach((s, i) => {\n        const u = s.userData; u.t += 0.01;\n        s.position.x += u.vx; s.position.y += u.vy + Math.sin(u.t) * 0.01; s.position.z += u.vz;\n        if (s.position.x > B.x || s.position.x < -B.x) u.vx *= -1;\n        if (s.position.y > B.y || s.position.y < -B.y) u.vy *= -1;\n        if (s.position.z > B.z || s.position.z < -B.z) u.vz *= -1;\n        const p = 1 + Math.sin(tm * 1.4 + i) * 0.08; s.material.size = u.base * p;\n      });\n      camera.position.x = Math.sin(tm * 0.3) * 2; camera.position.y = Math.cos(tm * 0.22) * 1.2; camera.lookAt(0, 0, 0);\n      renderer.render(scene, camera);\n      } catch (e) {}\n      requestAnimationFrame(loop);\n    };\n    loop();\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"},"entry":"Portfolio.dc"}
